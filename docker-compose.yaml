# UptimeBuddy — self-hosted, one-click docker compose.
#
#   docker compose up -d
#   open http://localhost:3000
#
# Only ONE image is custom-built (`app` = SPA bundle baked in). Everything
# else uses official upstream images with scripts/code mounted as volumes.
#
# Default JWT secret + keys below are the SAME as the public Supabase demo
# tokens. They work out of the box but are PUBLIC — set your own JWT_SECRET,
# ANON_KEY, SERVICE_ROLE_KEY, POSTGRES_PASSWORD, SECRET_KEY_BASE in
# production (see .env.example and README.md).

x-shared-env: &shared-env
  POSTGRES_HOST: db
  POSTGRES_PORT: "5432"
  POSTGRES_DB: postgres
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
  ANON_KEY: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlLWRlbW8iLCJpYXQiOjE2NDE3NjkyMDAsImV4cCI6MTc5OTUzNTYwMH0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE}
  SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UtZGVtbyIsImlhdCI6MTY0MTc2OTIwMCwiZXhwIjoxNzk5NTM1NjAwfQ.DaYlNEoUrrEn2Ig7tqibS-PHK5vgusbcbo7X36XVt4Q}
  # PUBLIC_API_URL defaults follow KONG_PORT so the two can't drift.
  PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:${KONG_PORT:-8000}}

services:
  # Official postgres image. Bootstrap SQL + migrations are mounted into
  # /docker-entrypoint-initdb.d and run automatically on first boot.
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/postgres/00-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - ./docker/postgres/run-migrations.sh:/docker-entrypoint-initdb.d/01-run-migrations.sh:ro
      - ./supabase/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      # Wait for run-migrations.sh to finish — it creates _uptimebuddy_ready
      # at the very end. Dependents only start after this passes.
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres && psql -U postgres -d postgres -tAc 'SELECT 1 FROM public._uptimebuddy_ready' | grep -q 1"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s
    networks: [internal]

  rest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_DB_USE_LEGACY_GUCS: "false"
    networks: [internal]

  realtime:
    image: supabase/realtime:v2.30.34
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "4000"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-UpNVntn3cDxHJpq99YMc1T1AQgQpc8kfYTuRgBiYa15BLrx8etQoXz3gZv1/u2oq}
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
    networks: [internal]

  # Official Supabase edge-runtime image. Functions are mounted from the repo,
  # so updates require no rebuild — just `docker compose restart functions`.
  functions:
    build:
      context: .
      dockerfile: docker/edge-runtime/Dockerfile
    image: uptimebuddy/edge-runtime:local
    restart: unless-stopped
    # Needed for real ICMP ping in the `ping` monitor type.
    cap_add:
      - NET_RAW
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *shared-env
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlLWRlbW8iLCJpYXQiOjE2NDE3NjkyMDAsImV4cCI6MTc5OTUzNTYwMH0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UtZGVtbyIsImlhdCI6MTY0MTc2OTIwMCwiZXhwIjoxNzk5NTM1NjAwfQ.DaYlNEoUrrEn2Ig7tqibS-PHK5vgusbcbo7X36XVt4Q}
      SUPABASE_DB_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
    volumes:
      - ./supabase/functions:/home/deno/functions:ro
    command: ["start", "--main-service", "/home/deno/functions/main", "-p", "9000"]
    networks: [internal]


  kong:
    image: kong:3.4
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./docker/kong/kong.yml:/usr/local/kong/kong.yml:ro
    ports:
      - "${KONG_PORT:-8000}:8000"
    networks: [internal]
    depends_on: [rest, realtime, functions]

  # The only custom image — SPA bundle baked in, nginx runtime.
  app:
    build: .
    image: ghcr.io/mulemew/uptimebuddy-app:latest
    restart: unless-stopped
    environment:
      API_URL: ${PUBLIC_API_URL:-http://localhost:${KONG_PORT:-8000}}
      ANON_KEY: ${ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlLWRlbW8iLCJpYXQiOjE2NDE3NjkyMDAsImV4cCI6MTc5OTUzNTYwMH0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE}
    ports:
      - "${APP_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [internal]
    depends_on: [kong]

  # Tiny cron loop — official curl image, script mounted from repo. No apk add.
  scheduler:
    image: curlimages/curl:8.10.1
    restart: unless-stopped
    user: "0"
    entrypoint: ["sh", "/usr/local/bin/run.sh"]
    environment:
      RUN_CHECKS_URL: http://kong:8000/functions/v1/run-checks
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UtZGVtbyIsImlhdCI6MTY0MTc2OTIwMCwiZXhwIjoxNzk5NTM1NjAwfQ.DaYlNEoUrrEn2Ig7tqibS-PHK5vgusbcbo7X36XVt4Q}
      TICK_SECONDS: "60"
    volumes:
      - ./docker/scheduler/run.sh:/usr/local/bin/run.sh:ro
    networks: [internal]
    depends_on: [kong]

volumes:
  db-data:

networks:
  internal:
    driver: bridge
